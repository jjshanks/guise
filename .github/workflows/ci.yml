name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    # guise is a Windows-only app (internal/tray and internal/editor have only
    # *_windows.go files), so the whole module only builds on Windows.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify gofmt
        shell: pwsh
        run: |
          $unformatted = gofmt -l .
          if ($unformatted) {
            Write-Host "These files are not gofmt-formatted:"
            Write-Host $unformatted
            exit 1
          }

      - name: go vet
        run: go vet ./...

      # Build through the release script so the version-stamping path is
      # exercised on every PR and can't rot before a tag is cut. With no tag
      # reachable it falls back to a v0.0.0-dev+<sha> version.
      - name: Build
        shell: pwsh
        run: ./scripts/build.ps1 -Output guise.exe

      - name: Test
        # GUISE_REGISTRY_IT opts in the winreg round-trip test (writes + cleans
        # up real HKCU browser-registration keys). Safe on an ephemeral runner;
        # left off by default so a local `go test` never touches a dev's real
        # registration.
        run: go test ./...
        env:
          GUISE_REGISTRY_IT: "1"
