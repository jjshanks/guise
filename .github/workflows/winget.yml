name: Submit to winget

# Each published stable release auto-opens a version-bump PR against
# microsoft/winget-pkgs for jjshanks.guise. The `released` event fires only for
# non-prerelease, non-draft releases, so hyphenated pre-release tags (v1.2.3-rc1)
# are skipped automatically -- matching the "stable only" update rule (SPEC §14).
#
# Prerequisites (one-time, see packaging/winget/README.md):
#   - The package already exists in winget-pkgs (bootstrap with `wingetcreate submit`).
#   - A fork of microsoft/winget-pkgs exists under the maintainer account.
#   - A classic PAT (public_repo scope) is stored as the secret WINGET_TOKEN.
on:
  release:
    types: [released]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to submit (e.g. v1.2.3)
        required: true

jobs:
  winget:
    runs-on: ubuntu-latest
    steps:
      - name: Submit version bump to winget-pkgs
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: jjshanks.guise
          # Pick the bare exe; ignore the guise.exe.sha256 checksum asset.
          installers-regex: 'guise\.exe$'
          # release.tag_name on a real release; the manual-dispatch input otherwise.
          # winget-releaser strips the leading "v" to form the PackageVersion.
          release-tag: ${{ github.event.release.tag_name || inputs.tag }}
          token: ${{ secrets.WINGET_TOKEN }}
